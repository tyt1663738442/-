# Fly.io 部署配置
# 安装 flyctl: https://fly.io/docs/hands-on/install-flyctl/
# 然后运行: fly launch

app = "a-stock-monitor"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
